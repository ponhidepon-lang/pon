<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>疲労チェック（PWA版）</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ffffff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="apple-touch-icon" href="icon.png">

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>

<style>
  video {
    width: 100%;
    max-width: 320px;
    height: 240px;
    background: black;
  }
  canvas {
    width: 100%;
    max-width: 320px;
    height: 240px;
  }
  #log { font-size: 14px; white-space: pre-line; }
  #startBtn { padding: 10px 20px; font-size: 18px; margin: 20px 0; }
</style>


</head>
<body>

<h3>疲労チェック（iPhone PWA版）</h3>

<button id="startBtn">カメラを開始</button>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>
<div id="score" style="font-size:20px; margin-top:10px;"></div>
<div id="log"></div>

<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const scoreDiv = document.getElementById("score");
const logDiv = document.getElementById("log");
const startBtn = document.getElementById("startBtn");

function dist(a, b) {
  return Math.hypot(a.x - b.x, a.y - b.y);
}

const faceMesh = new FaceMesh.FaceMesh({
  locateFile: file => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
});

faceMesh.setOptions({
  maxNumFaces: 1,
  refineLandmarks: true,
  minDetectionConfidence: 0.5,
  minTrackingConfidence: 0.5
});

faceMesh.onResults(results => {
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

  if (!results.multiFaceLandmarks) {
    scoreDiv.innerText = "顔が検出されていません";
    return;
  }

  const lm = results.multiFaceLandmarks[0];

  const L = [33,160,158,133,153,144];
  const R = [362,385,387,263,373,380];

  function EAR(ids) {
    const p = ids.map(i => lm[i]);
    const v1 = dist(p[1], p[5]);
    const v2 = dist(p[2], p[4]);
    const h  = dist(p[0], p[3]);
    return (v1 + v2) / (2 * h);
  }

  const ear = (EAR(L) + EAR(R)) / 2;
  const mouth = dist(lm[13], lm[14]);

  let fatigue = 0;
  if (ear < 0.20) fatigue += 40;
  if (mouth > 0.06) fatigue += 30;

  fatigue = Math.min(100, fatigue);

  scoreDiv.innerText = `疲労スコア: ${fatigue}`;
  logDiv.innerText = `EAR: ${ear.toFixed(3)}\nMOUTH: ${mouth.toFixed(3)}`;
});

async function loop() {
  canvas.width = 320;
  canvas.height = 240;

  await faceMesh.send({ image: video });
  requestAnimationFrame(loop);
}

// ▼ ここが最重要：ユーザー操作でカメラ開始
startBtn.onclick = async () => {
  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: "user", width: 320, height: 240 }
  });

  video.srcObject = stream;

  // ▼ Safari PWA では必須（これが無いと黒画面になる）
  video.muted = true;

  await video.play();  // ← PWA で必須

  startBtn.style.display = "none"; // ボタン非表示

  loop(); // ここで初めて開始
};
</script>

</body>
</html>
