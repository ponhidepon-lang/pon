<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>疲労チェック（iPhone 最適化）</title>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>

<style>
  video, canvas { width: 100%; max-width: 320px; }
  #log { font-size: 14px; white-space: pre-line; }
</style>
</head>
<body>

<h3>疲労チェック（iPhone 最適化版）</h3>
<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>
<div id="score" style="font-size:20px; margin-top:10px;"></div>
<div id="log"></div>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const scoreDiv = document.getElementById("score");
const logDiv = document.getElementById("log");

// ▼ iPhone Safari で安定する低解像度
navigator.mediaDevices.getUserMedia({
  video: { facingMode: "user", width: 320, height: 240 }
}).then(stream => {
  video.srcObject = stream;
});

// ▼ 距離計算
function dist(a, b) {
  return Math.hypot(a.x - b.x, a.y - b.y);
}

// ▼ FaceMesh 設定
const faceMesh = new FaceMesh.FaceMesh({
  locateFile: file => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
});

faceMesh.setOptions({
  maxNumFaces: 1,
  refineLandmarks: true,
  minDetectionConfidence: 0.5,
  minTrackingConfidence: 0.5
});

// ▼ FaceMesh の結果処理
faceMesh.onResults(results => {
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

  if (!results.multiFaceLandmarks) {
    scoreDiv.innerText = "顔が検出されていません";
    return;
  }

  const lm = results.multiFaceLandmarks[0];

  const L = [33,160,158,133,153,144];
  const R = [362,385,387,263,373,380];

  function EAR(ids) {
    const p = ids.map(i => lm[i]);
    const v1 = dist(p[1], p[5]);
    const v2 = dist(p[2], p[4]);
    const h  = dist(p[0], p[3]);
    return (v1 + v2) / (2 * h);
  }

  const ear = (EAR(L) + EAR(R)) / 2;
  const mouth = dist(lm[13], lm[14]);

  let fatigue = 0;
  if (ear < 0.20) fatigue += 40;
  if (mouth > 0.06) fatigue += 30;

  fatigue = Math.min(100, fatigue);

  scoreDiv.innerText = `疲労スコア: ${fatigue}`;
  logDiv.innerText = `EAR: ${ear.toFixed(3)}\nMOUTH: ${mouth.toFixed(3)}`;
});

// ▼ iPhone Safari で安定するループ処理
async function loop() {
  canvas.width = 320;
  canvas.height = 240;

  await faceMesh.send({ image: video });
  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
